# fly.toml — Voice Sentiment Analyzer deployment config for Fly.io.
#
# This config implements the architecture from the PRD (#1):
#
#   - Pattern alpha: long-held HTTP connections. Each /analyze request
#     stays in flight on the Machine until the analyzer fires its webhook,
#     so Fly's proxy treats the Machine as busy and will not auto-suspend
#     it mid-job. The caller (e.g. a Supabase edge function) is
#     fire-and-forget — it can disconnect after its own short timeout
#     while the analyzer keeps running.
#   - Scale-to-zero: min_machines_running = 0 with auto_stop_machines =
#     "suspend". The Machine sleeps when idle and wakes on the next
#     request. Cold-start latency is acceptable because the caller is
#     async (webhook-based) and ML jobs take many seconds anyway.
#   - Burst-to-3 concurrent Machines: hard_limit/soft_limit = 1 forces
#     the proxy to spin up another Machine for every concurrent request,
#     up to max_machines_running = 3. Three voice notes arriving in 10s
#     do not 504 waiting for a busy Machine.
#
# Notes for the operator running `fly launch`:
#   - You can override the app name on the command line with
#     `fly launch --name <your-name>` (must be globally unique on Fly).
#   - You can change the primary region to anything from `fly platform
#     regions`. iad (Ashburn, Virginia) is a sensible US East default.
#   - The Docker image is built from the existing Dockerfile at the repo
#     root — no [build] section needed.

app = "voice-sentiment-analyzer"
primary_region = "iad"  # Ashburn, VA. Change to e.g. "lhr", "fra", "sjc" as needed.

[build]
  dockerfile = "Dockerfile"

[env]
  # Cap glibc's per-thread malloc arenas. Default is 8 * cpu_count,
  # which on shared-cpu-4x means 32 separate arenas — each one keeps
  # its own free list, which fragments memory and inflates RSS across
  # many model.transcribe() calls. MALLOC_ARENA_MAX=2 collapses that
  # to two arenas, dramatically reducing fragmentation. Pairs with
  # the explicit malloc_trim(0) call between transcribe chunks in
  # ParakeetTranscriber. Common pattern in long-running ML workers.
  MALLOC_ARENA_MAX = "2"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
  max_machines_running = 3
  processes = ["app"]

  # One in-flight request per Machine. Pattern alpha relies on this:
  # if a second request lands while the Machine is busy, Fly's proxy
  # routes it to a new Machine (cold-starting one if needed) rather
  # than queueing behind the in-flight job.
  [http_service.concurrency]
    type = "requests"
    hard_limit = 1
    soft_limit = 1

[[vm]]
  # 8 shared CPUs + 16 GB RAM.
  #
  # Memory history during v0.1.1 smoke testing:
  #   * 4 GB OOM'd during model load.
  #   * 8 GB / shared-cpu-4x OOM'd at 7.89 GB resident with a real
  #     13-min voice note. Three optimization PRs walked the cause
  #     down but didn't get under the 8 GB cap:
  #       - PR #33: evict Parakeet + SpeechBrain caches between
  #         pipeline phases. Correct optimization, but didn't help
  #         this OOM because the peak happens INSIDE Parakeet's
  #         model.transcribe() call, before any caller-level eviction
  #         can fire.
  #       - PR #35: chunk audio into 60s segments before calling
  #         model.transcribe(), so per-chunk attention activations
  #         stay bounded. Confirmed working — per-chunk peak is small.
  #       - PR #36: malloc_trim(0) between chunks + MALLOC_ARENA_MAX=2
  #         to fight glibc's reluctance to return free pages to the
  #         kernel. Measurable: total-vm dropped from 17.5 GB → 16.2 GB
  #         across 11 chunks, but RSS still hit the 8 GB cap on chunk
  #         12 of 13 due to residual intra-arena fragmentation.
  #
  # Bumping to shared-cpu-8x with 16 GB is the simplest path to
  # finishing a 13-min request (and the up-to-20-min voice notes the
  # service is built for). Doubles per-second billing vs shared-cpu-4x,
  # but auto_stop_machines = "suspend" means idle cost stays near zero
  # — we only pay during the ~minutes a request is in flight. The 8
  # extra CPU shares also let Parakeet's per-chunk transcribe finish
  # faster, partially offsetting the higher rate.
  #
  # 16 GB gives ~8 GB headroom over the measured 7.88 GB OOM peak.
  # Tune lower (and revert to shared-cpu-4x) only after a future
  # refactor materially cuts that peak — e.g. moving Parakeet to a
  # quantized model or running each chunk in a subprocess to fully
  # release memory between iterations.
  cpu_kind = "shared"
  cpus = 8
  memory = "16gb"

[deploy]
  # Roll back to the previous release on failed health checks rather
  # than leaving the app in a broken state.
  strategy = "rolling"

[experimental]
  auto_rollback = true
