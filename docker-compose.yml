# docker-compose.yml — local development setup for the analyzer.
#
# Spins up the same Docker image used in production (built from the
# Dockerfile at the repo root) and exposes it on http://localhost:8080.
# Configuration is read from a .env file at the repo root — copy
# .env.example to .env and fill in API_KEY before bringing the stack up.
#
# Quickstart:
#   cp .env.example .env
#   # edit .env, set API_KEY=<some-random-string>
#   docker compose up --build
#
# Then in another terminal, serve a sample audio file with a one-liner
# Python HTTP server (the analyzer needs a publicly-fetchable URL even
# in local dev):
#
#   cd /path/to/audio/dir
#   python -m http.server 9000
#
# And POST a job:
#
#   curl -X POST http://localhost:8080/analyze \
#     -H "Authorization: Bearer $API_KEY" \
#     -H "Content-Type: application/json" \
#     -d '{
#       "audio_url": "http://host.docker.internal:9000/sample.wav",
#       "callback_url": "http://host.docker.internal:9001/cb",
#       "callback_secret": "0123456789abcdef0123456789abcdef",
#       "metadata": {"note_id": "demo"},
#       "request_id": "demo-1"
#     }'
#
# Note `host.docker.internal` — that resolves to the host machine from
# inside the container on Docker Desktop (macOS/Windows) and on recent
# Linux builds. The analyzer needs to reach the file server on the host.

services:
  vsa:
    build:
      context: .
      dockerfile: Dockerfile
    image: voice-sentiment-analyzer:local
    ports:
      - "8080:8080"
    environment:
      # Inbound API key — REQUIRED. Set this in .env (copy from
      # .env.example) before running `docker compose up`.
      API_KEY: ${API_KEY:?set API_KEY in .env before bringing the stack up}

      # Transcription engine: "parakeet" (default, NeMo) or "whisper"
      # (faster-whisper alternative). Slice 9 made this a runtime switch.
      TRANSCRIBER_ENGINE: ${TRANSCRIBER_ENGINE:-parakeet}

      # When TRANSCRIBER_ENGINE=whisper, controls which faster-whisper
      # model size is loaded. Ignored when using parakeet.
      WHISPER_MODEL: ${WHISPER_MODEL:-small}

      # Window size for the time-windowed analysis section (seconds).
      WINDOW_SECONDS: ${WINDOW_SECONDS:-30}

      # Maximum audio file size the AudioFetcher will accept (bytes).
      MAX_AUDIO_BYTES: ${MAX_AUDIO_BYTES:-52428800}

      # HF cache lives inside the image (models are baked in at build
      # time); override only if you know what you're doing.
      HF_HOME: /opt/hf-cache

    # /tmp is RAM-backed in production (Fly Machines do this implicitly).
    # Mirror it here so local dev exercises the same code path. Audio
    # downloads land here and are deleted after analysis.
    tmpfs:
      - /tmp
